name: Build Plugin

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # JetBrains Runtime 21 matches the local toolchain and avoids the
      # Kotlin-metadata issues seen with newer JDKs.
      - name: Set up JBR 21
        uses: actions/setup-java@v4
        with:
          distribution: jetbrains
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # The committed gradle.properties pins org.gradle.java.home /
      # installations.paths to local machine paths for the maintainer's
      # Java-25 host. Override them to the CI-provided JBR so the build is
      # portable. (-D system properties take precedence over gradle.properties.)
      - name: Build plugin
        run: >-
          ./gradlew buildPlugin test
          "-Dorg.gradle.java.home=$JAVA_HOME"
          "-Dorg.gradle.java.installations.paths=$JAVA_HOME"
          --stacktrace

      - name: Upload plugin zip
        uses: actions/upload-artifact@v4
        with:
          name: phpstorm-booster-plugin
          path: build/distributions/*.zip
          if-no-files-found: error
